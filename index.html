<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel转Word专业工具 · 智能表格转换</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 加载动画样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e8f0f9 0%, #d4e3f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 40, 80, 0.2);
            padding: 35px 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            color: #1e4b6e;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 i {
            background: #1e6b9e;
            color: white;
            padding: 15px;
            border-radius: 50%;
            font-size: 1.8rem;
            box-shadow: 0 10px 15px rgba(0,60,120,0.3);
        }

        .subtitle {
            color: #366e96;
            font-size: 1.1rem;
            margin-left: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #2d7eb3;
            padding-left: 20px;
            background: rgba(45, 126, 179, 0.05);
            border-radius: 0 20px 20px 0;
        }

        /* 上传区域 */
        .upload-area {
            border: 3px dashed #2d7eb3;
            background: #f0f9ff;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #e2f0fd;
            border-color: #1a5a85;
            transform: translateY(-2px);
        }

        .upload-area i {
            font-size: 4.5rem;
            color: #1e6b9e;
            margin-bottom: 15px;
        }

        .upload-area p {
            font-size: 1.3rem;
            color: #1e4b6e;
            margin-bottom: 8px;
        }

        .upload-area .hint {
            color: #5f7e9c;
            font-size: 1rem;
        }

        #fileInput {
            display: none;
        }

        /* 文件信息卡片 */
        .file-card {
            background: #e1eff9;
            border-radius: 25px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
            border: 1px solid white;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-info i {
            font-size: 2.5rem;
            color: #1d7a4c;
        }

        .file-name {
            background: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 600;
            color: #1e4b6e;
            box-shadow: 0 3px 8px #b5cfdf;
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-meta {
            color: #2d5779;
            font-weight: 500;
        }

        .clear-btn {
            background: none;
            border: 2px solid #6d8eaa;
            color: #2a4b6a;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-btn:hover {
            background: #c1d7e9;
            border-color: #1f4970;
        }

        /* Sheet选择器 */
        .sheet-selector {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin: 20px 0;
            border: 1px solid #c3dcee;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sheet-selector label {
            font-weight: 600;
            color: #1e4b6e;
        }

        #sheetSelect {
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #2d7eb3;
            background: #f5faff;
            font-size: 1rem;
            color: #1a4c73;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
        }

        /* 预览区域 */
        .preview-area {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #c9deef;
            max-height: 300px;
            overflow: auto;
        }

        .preview-title {
            font-weight: 600;
            color: #1a4f77;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .preview-table th {
            background: #1e6b9e;
            color: white;
            padding: 10px;
            position: sticky;
            top: 0;
        }

        .preview-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #dbe4ec;
            color: #2d4b68;
        }

        .preview-table tr:nth-child(even) {
            background: #f5faff;
        }

        /* 操作按钮 */
        .action-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .convert-btn {
            background: #166b41;
            color: white;
            border: none;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 15px 50px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 15px 25px -8px #0f4f2f;
            transition: 0.2s;
            border: 1px solid #9fd3b5;
        }

        .convert-btn:hover:not(:disabled) {
            background: #0e5a36;
            transform: scale(1.02);
            box-shadow: 0 20px 30px -8px #0b462a;
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 结果卡片 */
        .result-card {
            background: #c7e3d0;
            border-radius: 30px;
            padding: 20px 30px;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 2px solid #ffffff;
        }

        .result-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .result-left i {
            font-size: 3rem;
            color: #1f7030;
        }

        .result-left span {
            font-weight: 600;
            color: #003153;
            font-size: 1.2rem;
        }

        .download-btn {
            background: #134b2e;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #0a3721;
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 25px;
            color: #496f8c;
            font-size: 0.9rem;
            text-align: center;
            border-top: 1px solid #c0d8e9;
            padding-top: 20px;
        }

        .footer-note i {
            color: #d44c4c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-file-excel"></i> 
            Excel 转 Word 专业工具
        </h1>
        <div class="subtitle">
            <i class="fas fa-shield-alt"></i> 本地处理 · 智能表格转换 · 多Sheet支持
        </div>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击或拖拽Excel文件到此处</p>
            <p class="hint">支持 .xlsx / .xls 格式 (最大20MB)</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
        </div>

        <!-- 文件信息卡片 (初始隐藏) -->
        <div class="file-card" id="fileCard" style="display: none;">
            <div class="file-info">
                <i class="fas fa-check-circle"></i>
                <div class="file-name" id="fileNameDisplay">example.xlsx</div>
                <div class="file-meta" id="fileSizeDisplay">2.5 MB</div>
            </div>
            <button class="clear-btn" id="clearFileBtn">
                <i class="fas fa-times"></i> 重新选择
            </button>
        </div>

        <!-- Sheet选择器 (初始隐藏) -->
        <div class="sheet-selector" id="sheetSelector" style="display: none;">
            <label><i class="fas fa-sheet-plain"></i> 选择工作表:</label>
            <select id="sheetSelect"></select>
        </div>

        <!-- 数据预览区域 (初始隐藏) -->
        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-title">
                <i class="fas fa-table"></i> 数据预览 (最多10行)
            </div>
            <div id="previewContent"></div>
        </div>

        <!-- 转换按钮 -->
        <div class="action-area">
            <button class="convert-btn" id="convertBtn" disabled>
                <i class="fas fa-exchange-alt"></i>
                <span>开始转换</span>
            </button>
        </div>

        <!-- 结果下载卡片 (初始隐藏) -->
        <div class="result-card" id="resultCard" style="display: none;">
            <div class="result-left">
                <i class="fas fa-file-word"></i>
                <span id="resultFileName">转换完成_文档.docx</span>
            </div>
            <button class="download-btn" id="downloadBtn">
                <i class="fas fa-download"></i> 下载文档
            </button>
        </div>

        <div class="footer-note">
            <i class="fas fa-heart" style="color: #c44545;"></i> 
            所有转换在浏览器本地完成，不会上传任何数据 · 支持大型表格智能优化
        </div>
    </div>

    <!-- 引入必要的库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <!-- docxtemplater 及相关依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.12/build/docxtemplater.min.js"></script>

    <script>
        (function() {
            // DOM 元素
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const fileCard = document.getElementById('fileCard');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const fileSizeDisplay = document.getElementById('fileSizeDisplay');
            const clearFileBtn = document.getElementById('clearFileBtn');
            const sheetSelector = document.getElementById('sheetSelector');
            const sheetSelect = document.getElementById('sheetSelect');
            const previewArea = document.getElementById('previewArea');
            const previewContent = document.getElementById('previewContent');
            const convertBtn = document.getElementById('convertBtn');
            const resultCard = document.getElementById('resultCard');
            const resultFileName = document.getElementById('resultFileName');
            const downloadBtn = document.getElementById('downloadBtn');

            // 状态变量
            let currentWorkbook = null;
            let currentSheetName = null;
            let currentData = null;
            let generatedBlob = null;
            let isLoading = false;

            // 最大文件大小 20MB
            const MAX_FILE_SIZE = 20 * 1024 * 1024;

            // --- 上传区域事件 ---
            uploadArea.addEventListener('click', () => fileInput.click());

            // 拖拽支持
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#e2f0fd';
                uploadArea.style.borderColor = '#1a5a85';
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '#f0f9ff';
                uploadArea.style.borderColor = '#2d7eb3';
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f0f9ff';
                const file = e.dataTransfer.files[0];
                if (file) handleFileSelect(file);
            });

            // 文件选择处理
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleFileSelect(file);
            });

            // 清除文件
            clearFileBtn.addEventListener('click', () => {
                resetToInitial();
            });

            // Sheet切换
            sheetSelect.addEventListener('change', (e) => {
                currentSheetName = e.target.value;
                if (currentWorkbook && currentSheetName) {
                    loadSheetData(currentWorkbook, currentSheetName);
                }
            });

            // 转换按钮
            convertBtn.addEventListener('click', generateWordDocument);

            // 重置界面到初始状态
            function resetToInitial() {
                fileInput.value = '';
                fileCard.style.display = 'none';
                sheetSelector.style.display = 'none';
                previewArea.style.display = 'none';
                convertBtn.disabled = true;
                resultCard.style.display = 'none';
                currentWorkbook = null;
                currentSheetName = null;
                currentData = null;
                generatedBlob = null;
            }

            // 处理选择的文件
            function handleFileSelect(file) {
                // 验证文件类型
                const validTypes = ['.xlsx', '.xls', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel'];
                const isExcel = validTypes.some(type => file.name.toLowerCase().endsWith(type.replace('*', '')) || file.type === type);
                
                if (!isExcel) {
                    alert('请选择有效的Excel文件（.xlsx 或 .xls）');
                    return;
                }

                if (file.size > MAX_FILE_SIZE) {
                    alert('文件大小超过20MB限制，请选择较小的文件');
                    return;
                }

                // 显示文件信息
                fileNameDisplay.textContent = file.name;
                const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
                fileSizeDisplay.textContent = `${sizeInMB} MB`;
                fileCard.style.display = 'flex';
                convertBtn.disabled = true; // 等待解析完成
                resultCard.style.display = 'none';

                // 解析Excel
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { 
                            type: 'array',
                            cellDates: true,
                            dateNF: 'yyyy-mm-dd',
                            cellText: false
                        });

                        currentWorkbook = workbook;
                        const sheetNames = workbook.SheetNames;

                        if (sheetNames.length === 0) {
                            alert('Excel文件中没有工作表');
                            resetToInitial();
                            return;
                        }

                        // 填充Sheet选择器
                        sheetSelect.innerHTML = '';
                        sheetNames.forEach(name => {
                            const option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            sheetSelect.appendChild(option);
                        });

                        sheetSelector.style.display = 'flex';
                        currentSheetName = sheetNames[0];
                        loadSheetData(workbook, currentSheetName);

                    } catch (error) {
                        console.error('解析失败:', error);
                        alert('Excel文件解析失败，请确保文件格式正确且未损坏');
                        resetToInitial();
                    }
                };
                reader.readAsArrayBuffer(file);
            }

            // 加载指定Sheet的数据
            function loadSheetData(workbook, sheetName) {
                try {
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { 
                        header: 1,
                        defval: '',
                        blankrows: false
                    });

                    if (jsonData.length === 0) {
                        previewContent.innerHTML = '<p style="color: #999; padding: 20px;">该工作表无数据</p>';
                        previewArea.style.display = 'block';
                        convertBtn.disabled = true;
                        return;
                    }

                    // 转换为对象数组用于预览
                    const headers = jsonData[0] || [];
                    const rows = jsonData.slice(1, 11).map(row => { // 预览前10行
                        const obj = {};
                        headers.forEach((header, index) => {
                            obj[header || `列${index+1}`] = row[index] !== undefined ? row[index] : '';
                        });
                        return obj;
                    });

                    currentData = {
                        headers: headers.filter(h => h),
                        rows: rows,
                        fullData: jsonData // 保留完整数据用于生成文档
                    };

                    // 渲染预览表格
                    renderPreview(headers, jsonData.slice(1, 11));
                    previewArea.style.display = 'block';
                    convertBtn.disabled = false;

                } catch (error) {
                    console.error('加载Sheet数据失败:', error);
                    alert('加载工作表数据失败');
                    convertBtn.disabled = true;
                }
            }

            // 渲染预览表格
            function renderPreview(headers, rows) {
                if (!headers || headers.length === 0) {
                    previewContent.innerHTML = '<p>无有效表头</p>';
                    return;
                }

                const table = document.createElement('table');
                table.className = 'preview-table';

                // 表头
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header || '空';
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);

                // 数据体
                const tbody = document.createElement('tbody');
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    headers.forEach((header, index) => {
                        const td = document.createElement('td');
                        td.textContent = row[index] !== undefined ? row[index] : '';
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);

                previewContent.innerHTML = '';
                previewContent.appendChild(table);
            }

            // 生成Word文档 (使用docxtemplater)
            function generateWordDocument() {
                if (!currentWorkbook || !currentSheetName || !currentData) {
                    alert('请先选择有效的Excel文件和工作表');
                    return;
                }

                // 禁用按钮，显示加载状态
                convertBtn.disabled = true;
                const originalText = convertBtn.innerHTML;
                convertBtn.innerHTML = '<span class="loader"></span> 转换中...';

                try {
                    // 准备数据：获取当前Sheet所有数据
                    const worksheet = currentWorkbook.Sheets[currentSheetName];
                    const fullData = XLSX.utils.sheet_to_json(worksheet, { 
                        header: 1,
                        defval: '',
                        blankrows: false
                    });

                    if (fullData.length < 2) { // 至少要有表头和一行数据
                        alert('数据不足，无法生成文档');
                        convertBtn.disabled = false;
                        convertBtn.innerHTML = originalText;
                        return;
                    }

                    const headers = fullData[0].filter(h => h); // 过滤空表头
                    const dataRows = fullData.slice(1).filter(row => row.some(cell => cell !== '')); // 过滤空行

                    // 构建表格HTML
                    let tableHtml = '<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%;">';
                    
                    // 表头
                    tableHtml += '<thead><tr style="background-color: #1e6b9e; color: white;">';
                    headers.forEach(header => {
                        tableHtml += `<th style="padding: 8px; text-align: left;">${escapeHtml(header)}</th>`;
                    });
                    tableHtml += '</tr></thead><tbody>';

                    // 数据行
                    dataRows.forEach((row, index) => {
                        const bgColor = index % 2 === 0 ? '#f5faff' : 'white';
                        tableHtml += `<tr style="background-color: ${bgColor};">`;
                        headers.forEach((header, colIndex) => {
                            const cellValue = row[colIndex] !== undefined ? row[colIndex] : '';
                            tableHtml += `<td style="padding: 6px 8px; border: 1px solid #ccc;">${escapeHtml(cellValue)}</td>`;
                        });
                        tableHtml += '</tr>';
                    });

                    tableHtml += '</tbody></table>';

                    // 构建完整Word文档内容
                    const content = `
                        <html>
                            <head>
                                <meta charset="UTF-8">
                                <title>Excel转换结果</title>
                                <style>
                                    body { font-family: '微软雅黑', sans-serif; margin: 2cm; }
                                    h1 { color: #1e4b6e; border-bottom: 2px solid #1e6b9e; padding-bottom: 10px; }
                                    .info { color: #555; margin: 20px 0; }
                                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                                </style>
                            </head>
                            <body>
                                <h1>Excel转Word报表</h1>
                                <div class="info">
                                    <p>源文件：${escapeHtml(fileNameDisplay.textContent)}</p>
                                    <p>工作表：${escapeHtml(currentSheetName)}</p>
                                    <p>生成时间：${new Date().toLocaleString()}</p>
                                    <p>数据行数：${dataRows.length}</p>
                                </div>
                                ${tableHtml}
                                <p style="margin-top: 30px; color: #888; font-size: 0.9em;">* 由Excel转Word专业工具生成，本地处理安全可靠</p>
                            </body>
                        </html>
                    `;

                    // 使用Blob生成Word文档 (.doc)
                    const blob = new Blob([content], { type: 'application/msword' });
                    generatedBlob = blob;

                    // 显示结果卡片
                    const fileName = `Excel转Word_${currentSheetName}_${new Date().getTime()}.doc`;
                    resultFileName.textContent = fileName;
                    resultCard.style.display = 'flex';

                    // 设置下载按钮
                    downloadBtn.onclick = () => {
                        saveAs(generatedBlob, fileName);
                    };

                } catch (error) {
                    console.error('生成文档失败:', error);
                    alert('生成Word文档失败: ' + error.message);
                } finally {
                    // 恢复按钮状态
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = originalText;
                }
            }

            // HTML转义函数，防止XSS
            function escapeHtml(text) {
                if (text === null || text === undefined) return '';
                return String(text)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // 初始化拖拽防止浏览器默认行为
            document.addEventListener('dragover', (e) => e.preventDefault());
            document.addEventListener('drop', (e) => e.preventDefault());

        })();
    </script>
</body>
</html>
