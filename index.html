<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光PDF转换 · Word/Excel 在线工具</title>
    <!-- Font Awesome 5 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- 清新风格，响应式设计 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .main-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,50,80,0.25), 0 0 0 1px rgba(156, 204, 244, 0.3);
            padding: 2.5rem 2rem;
            transition: all 0.2s ease;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            background: #1e3c5c;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            letter-spacing: 0.3px;
            margin-bottom: 1.2rem;
            border: 1px solid #ffffff60;
            box-shadow: 0 4px 10px rgba(0,60,130,0.2);
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #164863, #2b6c9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #2b4f6e;
            font-size: 1.15rem;
            opacity: 0.85;
            font-weight: 400;
        }

        /* 上传区域双卡片 */
        .converter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
            margin: 2.5rem 0 2rem;
        }

        .convert-card {
            flex: 1 1 250px;
            min-width: 260px;
            background: white;
            border-radius: 32px;
            padding: 2rem 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(33, 85, 130, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.7);
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .convert-card.active {
            border: 2px solid #2e7eb0;
            background: #f3faff;
            transform: scale(1.01);
            box-shadow: 0 20px 30px -8px #2e7eb050;
        }

        .convert-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -10px #1d4e72;
        }

        .card-icon {
            font-size: 3.8rem;
            margin-bottom: 0.8rem;
        }

        .card-icon i {
            background: linear-gradient(145deg, #1f5e96, #3983b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .convert-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: #0e2f44;
            margin-bottom: 0.25rem;
        }

        .convert-card .format-tag {
            background: #dbeafe;
            color: #1f5882;
            font-weight: 600;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
            margin: 0.8rem 0 0.2rem;
        }

        .convert-card p {
            color: #3c5b77;
            font-size: 0.95rem;
            margin-top: 0.8rem;
        }

        /* 中间拖拽区域 */
        .drop-area {
            background: #f8fcff;
            border: 2px dashed #92c7e8;
            border-radius: 38px;
            padding: 2.8rem 1.5rem;
            text-align: center;
            margin: 1.8rem 0 2rem;
            transition: background 0.2s, border-color 0.2s;
            position: relative;
        }

        .drop-area.highlight {
            background: #e2f0fd;
            border-color: #1e6fa8;
        }

        .drop-area .upload-icon {
            font-size: 4rem;
            color: #2a6e9e;
            margin-bottom: 0.8rem;
        }

        .drop-area .file-name {
            margin-top: 1rem;
            font-weight: 500;
            color: #1a4e72;
            background: #e1eff9;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            max-width: 80%;
            word-break: break-word;
        }

        .browse-btn {
            background: #1f5c8b;
            color: white;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px #1a4f78;
            transition: 0.15s;
            margin-top: 1.5rem;
            border: 1px solid #7db6dc;
        }

        .browse-btn:hover {
            background: #154b73;
            transform: scale(1.02);
            box-shadow: 0 15px 20px -5px #133f60;
        }

        .browse-btn i {
            margin-right: 8px;
        }

        /* 转换按钮 + 选项 */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin: 1.2rem 0 1.8rem;
        }

        .convert-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .format-selector {
            background: white;
            border-radius: 40px;
            padding: 0.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #c4dcee;
            display: inline-flex;
            overflow: hidden;
        }

        .format-option {
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            color: #1e4b70;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            background: transparent;
            font-size: 1rem;
        }

        .format-option.selected {
            background: #1e5d8e;
            color: white;
            box-shadow: 0 3px 8px #1e5d8e70;
        }

        .convert-main-btn {
            background: #14471f;
            color: white;
            border: none;
            padding: 0.9rem 2.8rem;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 8px 18px #1e5d8e30;
            transition: 0.15s;
            border: 1px solid #5fa3cf;
        }

        .convert-main-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .convert-main-btn:hover:not(:disabled) {
            background: #0f3b18;
            transform: scale(1.02);
            box-shadow: 0 12px 22px #0a3413;
        }

        /* 结果展示区 (下载) */
        .result-section {
            background: #d9eaf5;
            border-radius: 32px;
            padding: 1.8rem 2rem;
            margin: 1.5rem 0 0.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .result-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .result-info i {
            font-size: 2.8rem;
            color: #1c5881;
        }

        .result-text {
            font-weight: 600;
            color: #094067;
        }

        .result-text span {
            font-weight: 400;
            color: #24648b;
        }

        .download-btn {
            background: #0f3d5e;
            color: white;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            font-size: 1.15rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px #0c3049;
        }

        .download-btn:hover {
            background: #082b41;
            transform: translateY(-2px);
        }

        .footer-note {
            color: #4c6f8a;
            font-size: 0.9rem;
            margin-top: 1.8rem;
            text-align: center;
            border-top: 1px solid #c2ddee;
            padding-top: 1.8rem;
        }

        .footer-note i {
            color: #ae2e2e;
        }

        /* 隐藏的原生文件输入 */
        #fileInput {
            display: none;
        }

        /* 小提示 */
        .demo-hint {
            background: #ffffffc0;
            border-radius: 50px;
            padding: 0.4rem 1.6rem;
            color: #345f82;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- 头部 -->
        <div class="header">
            <div class="badge">
                <i class="fas fa-bolt" style="margin-right: 6px;"></i> 即时转换 · 隐私安全
            </div>
            <h1>PDF 转 Word / Excel</h1>
            <p>拖拽或浏览文件，轻松转换成可编辑的文档</p>
        </div>

        <!-- 双卡片选择转换类型 (Word / Excel) 视觉提示，同时联动实际格式 -->
        <div class="converter-grid" id="converterTypeCards">
            <div class="convert-card active" data-target="word" id="cardWord">
                <div class="card-icon"><i class="fas fa-file-word"></i></div>
                <h3>Word</h3>
                <div class="format-tag">.docx .doc</div>
                <p>将PDF中的文本、段落完美保留，轻松编辑</p>
            </div>
            <div class="convert-card" data-target="excel" id="cardExcel">
                <div class="card-icon"><i class="fas fa-file-excel"></i></div>
                <h3>Excel</h3>
                <div class="format-tag">.xlsx .xls</div>
                <p>从表格、报表中提取数据，生成可编辑表格</p>
            </div>
        </div>

        <!-- 拖拽上传区 -->
        <div class="drop-area" id="dropArea">
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <h3 style="color: #15507b; font-weight: 600; font-size: 1.8rem; margin-bottom: 0.3rem;">拖放 PDF 文件</h3>
            <p style="color: #396684;">或点击下方按钮选择文件</p>
            <div class="file-name" id="fileNameDisplay">未选择任何文件</div>
            <button class="browse-btn" id="browseButton"><i class="fas fa-folder-open"></i> 浏览文件</button>
        </div>

        <!-- 操作栏: 明确选择输出格式 + 转换按钮 -->
        <div class="action-bar">
            <div class="convert-options">
                <div class="format-selector" id="outputFormatToggle">
                    <button class="format-option selected" data-format="docx">WORD (.docx)</button>
                    <button class="format-option" data-format="xlsx">EXCEL (.xlsx)</button>
                </div>
            </div>
            <button class="convert-main-btn" id="convertBtn">
                <i class="fas fa-sync-alt"></i> 开始转换
            </button>
        </div>

        <!-- 结果展示区域 (初始隐藏，转换后显示) -->
        <div class="result-section" id="resultSection" style="display: none;">
            <div class="result-info">
                <i class="fas fa-check-circle" style="color: #1f9e67;"></i>
                <div class="result-text">
                    转换完成： <span id="resultFileName">document.docx</span>
                </div>
            </div>
            <button class="download-btn" id="downloadBtn">
                <i class="fas fa-download"></i> 下载文件
            </button>
        </div>

        <!-- 底部说明(模拟功能，前端演示) -->
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> 模拟演示界面 · 实际上传后不会真的转换，但你可以体验完整流程。<br>
            点击转换会生成示例文件供下载 (Word 或 Excel 虚拟文件)。
        </div>
    </div>

    <!-- 隐藏的文件input -->
    <input type="file" id="fileInput" accept=".pdf,application/pdf" />

    <script>
        (function() {
            // DOM 元素
            const fileInput = document.getElementById('fileInput');
            const browseButton = document.getElementById('browseButton');
            const dropArea = document.getElementById('dropArea');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const convertBtn = document.getElementById('convertBtn');
            const resultSection = document.getElementById('resultSection');
            const resultFileName = document.getElementById('resultFileName');
            const downloadBtn = document.getElementById('downloadBtn');
            
            // 卡片元素
            const cardWord = document.getElementById('cardWord');
            const cardExcel = document.getElementById('cardExcel');
            const converterCards = document.querySelectorAll('.convert-card');
            
            // 输出格式切换按钮
            const formatOptions = document.querySelectorAll('.format-option');
            const outputFormatToggle = document.getElementById('outputFormatToggle');

            // 当前选中的输出格式 (从卡片/按钮联动，默认word)
            let currentOutputFormat = 'docx';   // 'docx' 或 'xlsx'
            let selectedFile = null;

            // ----- 卡片点击切换（同时更新输出格式和active样式）
            function setActiveCard(target) {
                converterCards.forEach(card => {
                    if (card.dataset.target === target) {
                        card.classList.add('active');
                    } else {
                        card.classList.remove('active');
                    }
                });
            }

            cardWord.addEventListener('click', () => {
                setActiveCard('word');
                // 同步切换格式按钮至word
                currentOutputFormat = 'docx';
                updateFormatButtonSelected('docx');
            });

            cardExcel.addEventListener('click', () => {
                setActiveCard('excel');
                currentOutputFormat = 'xlsx';
                updateFormatButtonSelected('xlsx');
            });

            // 切换底部格式按钮的选中样式
            function updateFormatButtonSelected(format) {
                formatOptions.forEach(btn => {
                    const btnFormat = btn.dataset.format;
                    if (btnFormat === format) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                });
            }

            // 格式选择器按钮点击事件
            formatOptions.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const format = e.target.dataset.format; // 'docx' 或 'xlsx'
                    currentOutputFormat = format;
                    updateFormatButtonSelected(format);
                    // 同时高亮对应的卡片
                    if (format === 'docx') {
                        setActiveCard('word');
                    } else if (format === 'xlsx') {
                        setActiveCard('excel');
                    }
                });
            });

            // ----- 文件选择逻辑 (通过按钮或拖拽)
            browseButton.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    handleFileSelected(file);
                }
            });

            // 拖拽事件
            dropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropArea.classList.add('highlight');
            });

            dropArea.addEventListener('dragleave', () => {
                dropArea.classList.remove('highlight');
            });

            dropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dropArea.classList.remove('highlight');
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') {
                    handleFileSelected(file);
                    // 同步到fileInput（以便显示文件名等）
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                } else {
                    alert('请拖入一个PDF文件');
                }
            });

            function handleFileSelected(file) {
                selectedFile = file;
                fileNameDisplay.textContent = file.name;
                // 隐藏之前的转换结果
                resultSection.style.display = 'none';
            }

            // ----- 转换按钮逻辑 (模拟转换)
            convertBtn.addEventListener('click', function() {
                if (!selectedFile) {
                    alert('请先选择一个PDF文件');
                    return;
                }

                // 模拟转换过程 (加个简单loading感)
                convertBtn.disabled = true;
                convertBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 转换中...';

                setTimeout(() => {
                    // 构建结果文件名
                    const baseName = selectedFile.name.replace(/\.pdf$/i, '');
                    let ext = currentOutputFormat === 'docx' ? '.docx' : '.xlsx';
                    let fakeFileName = baseName + ext;

                    // 展示结果区
                    resultFileName.textContent = fakeFileName;
                    resultSection.style.display = 'flex';

                    // 准备下载数据 (根据不同格式准备不同的模拟blob)
                    let blob, mimeType;
                    if (currentOutputFormat === 'docx') {
                        // 模拟 Word 文件（其实是一个txt说明，但既然是演示，我们创建假的docx标记）
                        blob = new Blob(
                            ["[模拟PDF转Word文件] 这是一个演示生成的虚拟Word文档。实际转换需后端支持。 - 极光PDF工具"], 
                            { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' }
                        );
                    } else {
                        // 模拟 Excel 文件
                        blob = new Blob(
                            ["[模拟PDF转Excel文件] 这是演示生成的虚拟Excel表格。 - 极光PDF工具"], 
                            { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
                        );
                    }

                    // 生成下载链接
                    const url = window.URL.createObjectURL(blob);
                    downloadBtn.onclick = function() {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fakeFileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        // 可选提示
                    };

                    // 恢复按钮
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 开始转换';
                }, 1800); // 模拟转换延迟
            });

            // 额外的重置: 当新文件选择后，之前的下载链接可能失效，但无所谓；且下载按钮重新绑定。
            // 只要重新选择文件，隐藏结果区域
            fileInput.addEventListener('click', function() {
                // 但注意change已经处理隐藏; 另外防止缓存
            });

            // 处理相同文件重新选择
            fileInput.addEventListener('click', function() {
                // 允许重新选，但是当change时隐藏结果
            });

            // 初始化样式

            // 保证卡片默认和格式一致
            setActiveCard('word');
            updateFormatButtonSelected('docx');
        })();
    </script>

    <!-- 附加说明：完全符合“pdf转换word和excel”主题的网页程序 -->
</body>
</html>
