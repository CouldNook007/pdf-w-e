<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF转Excel/Word · 图片增强版 | 本地完整处理</title>
    <!-- 稳定CDN库 -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <!-- docxtemplater 用于Word生成 -->
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.12/build/docxtemplater.min.js"></script>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e9f0f9 0%, #d2e3f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px rgba(0, 40, 80, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.7);
            padding: 2.5rem 2.8rem;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 2.6rem;
            font-weight: 700;
            color: #153e5c;
            margin-bottom: 0.3rem;
        }

        h1 i {
            background: #1b6999;
            color: white;
            padding: 18px;
            border-radius: 30px;
            font-size: 2.2rem;
            box-shadow: 0 15px 20px -8px #0a3e60;
        }

        .badge {
            margin-left: 15px;
            margin-bottom: 2rem;
            padding: 0.5rem 2rem;
            background: rgba(43, 120, 180, 0.12);
            border-radius: 60px;
            display: inline-block;
            color: #1a5680;
            font-weight: 500;
            border-left: 6px solid #2673b0;
        }

        /* 上传区域 */
        .upload-area {
            border: 3px dashed #3183c4;
            background: #f2f9ff;
            border-radius: 44px;
            padding: 2.5rem 1.8rem;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            margin: 1.8rem 0 1.8rem;
        }

        .upload-area:hover {
            background: #e2f0fd;
            border-color: #0f5b94;
            transform: translateY(-2px);
        }

        .upload-area i {
            font-size: 5rem;
            color: #1f6fa8;
            margin-bottom: 0.8rem;
        }

        .upload-area p {
            color: #1f4f77;
            font-size: 1.3rem;
            font-weight: 500;
        }

        #fileInput {
            display: none;
        }

        .file-info-bar {
            background: #e1eff9;
            border-radius: 50px;
            padding: 0.8rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin: 1.2rem 0 1.8rem;
        }

        .file-detail {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-detail i {
            font-size: 2rem;
            color: #1b6999;
        }

        .file-name {
            background: white;
            padding: 0.4rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            color: #123b5e;
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-pages {
            color: #2c577c;
            font-weight: 500;
        }

        /* 格式选择卡片 (横向) */
        .format-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 25px 0;
            justify-content: center;
        }

        .format-card {
            flex: 1 1 200px;
            background: white;
            border: 2px solid #c2d8ec;
            border-radius: 28px;
            padding: 1.5rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: 0.15s;
        }

        .format-card.active {
            border-color: #1f6fa8;
            background: #e6f1fe;
            box-shadow: 0 8px 18px -8px #2a6d9c;
        }

        .format-card i {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .format-card.excel i { color: #1e7e4a; }
        .format-card.word i { color: #256e9e; }

        .format-card h3 {
            font-size: 1.6rem;
            color: #123b5e;
        }

        .format-card p {
            color: #4c6f8f;
            font-size: 0.9rem;
        }

        /* 转换按钮 */
        .action-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .convert-btn {
            background: #166b41;
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 1.2rem 4rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 15px 25px -10px #0f4f2f;
            transition: 0.2s;
            border: 1px solid #a2d3b7;
        }

        .convert-btn:disabled {
            opacity: 0.45;
            pointer-events: none;
            filter: grayscale(0.4);
        }

        .convert-btn:hover:not(:disabled) {
            background: #0e5a36;
            transform: scale(1.02);
            box-shadow: 0 22px 30px -10px #0b462a;
        }

        /* 结果卡片 */
        .result-card {
            background: #c7e3d0;
            border-radius: 40px;
            padding: 1.5rem 2.2rem;
            margin: 20px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 2px solid #ffffff;
        }

        .result-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .result-left i {
            font-size: 3rem;
            color: #1f7030;
        }

        .result-left span {
            font-weight: 600;
            color: #003153;
            font-size: 1.2rem;
        }

        .download-btn {
            background: #134b2e;
            color: white;
            border: none;
            padding: 1rem 2.8rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #0a3721;
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 30px;
            color: #3b688b;
            font-size: 0.95rem;
            border-top: 1px solid #bed4e9;
            padding-top: 20px;
            text-align: center;
        }

        .footer-note i {
            color: #c14040;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>
            <i class="fas fa-file-pdf"></i> 
            PDF 全能转换器 · 图片增强版
        </h1>
        <div class="badge">
            <i class="fas fa-shield-alt"></i> 完全本地处理 · 支持提取图片嵌入Word
        </div>

        <!-- 上传区 -->
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击或拖拽 PDF 文件到此处</p>
            <p style="font-size: 1rem; opacity: 0.8;">支持含文本和图片的PDF（图片将嵌入Word文档）</p>
            <input type="file" id="fileInput" accept=".pdf">
        </div>

        <!-- 文件信息栏 (初始隐藏) -->
        <div class="file-info-bar" id="fileInfoBar" style="display: none;">
            <div class="file-detail">
                <i class="fas fa-file-pdf"></i>
                <span class="file-name" id="fileNameDisplay">document.pdf</span>
                <span class="file-pages" id="pageCountDisplay">0 页</span>
            </div>
            <button class="clear-btn" id="clearFileBtn" style="background: none; border: 2px solid #2c577c; color: #1f4f77; padding: 0.4rem 1.8rem; border-radius: 40px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-times"></i> 重新选择
            </button>
        </div>

        <!-- 格式选择卡片 -->
        <div class="format-row">
            <div class="format-card excel active" id="formatExcel" data-format="xlsx">
                <i class="fas fa-file-excel"></i>
                <h3>Excel</h3>
                <p>提取表格文本 · 分页存储</p>
            </div>
            <div class="format-card word" id="formatWord" data-format="docx">
                <i class="fas fa-file-word"></i>
                <h3>Word</h3>
                <p>保留文本 + 嵌入图片</p>
            </div>
        </div>

        <!-- 转换按钮 -->
        <div class="action-area">
            <button class="convert-btn" id="convertBtn" disabled>
                <i class="fas fa-sync-alt"></i>
                <span>开始转换</span>
            </button>
        </div>

        <!-- 结果下载卡片 (初始隐藏) -->
        <div class="result-card" id="resultCard" style="display: none;">
            <div class="result-left">
                <i class="fas fa-check-circle"></i>
                <span id="resultFileName">转换完成_文档.xlsx</span>
            </div>
            <button class="download-btn" id="downloadBtn">
                <i class="fas fa-download"></i> 下载文件
            </button>
        </div>

        <div class="footer-note">
            <i class="fas fa-heart"></i> 所有转换均在您的浏览器内完成，不会上传任何数据。Word文档现在将包含从PDF提取的图片（以base64形式嵌入）。
        </div>
    </div>

    <script>
        (function() {
            // 配置 PDF.js worker
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

            // DOM 元素
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const fileInfoBar = document.getElementById('fileInfoBar');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const pageCountDisplay = document.getElementById('pageCountDisplay');
            const clearFileBtn = document.getElementById('clearFileBtn');
            const formatExcel = document.getElementById('formatExcel');
            const formatWord = document.getElementById('formatWord');
            const convertBtn = document.getElementById('convertBtn');
            const resultCard = document.getElementById('resultCard');
            const resultFileName = document.getElementById('resultFileName');
            const downloadBtn = document.getElementById('downloadBtn');

            // 状态变量
            let currentPDF = null;          // PDF 文档对象
            let currentFile = null;          // 原始文件
            let totalPages = 0;
            let targetFormat = 'xlsx';       // 默认 Excel
            let extractedData = null;         // 存储提取的文本+图片数据
            let generatedBlob = null;

            // --- 事件绑定 ---
            uploadArea.addEventListener('click', () => fileInput.click());

            // 拖拽支持
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#e2f0fd';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '#f2f9ff';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f2f9ff';
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') handleFileSelect(file);
                else alert('请拖入PDF文件');
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleFileSelect(file);
            });

            // 清除文件
            clearFileBtn.addEventListener('click', () => {
                resetState();
            });

            // 格式切换
            formatExcel.addEventListener('click', () => {
                formatExcel.classList.add('active');
                formatWord.classList.remove('active');
                targetFormat = 'xlsx';
            });
            formatWord.addEventListener('click', () => {
                formatWord.classList.add('active');
                formatExcel.classList.remove('active');
                targetFormat = 'docx';
            });

            // 转换按钮
            convertBtn.addEventListener('click', startConversion);

            // --- 重置状态 ---
            function resetState() {
                fileInput.value = '';
                fileInfoBar.style.display = 'none';
                convertBtn.disabled = true;
                resultCard.style.display = 'none';
                currentPDF = null;
                currentFile = null;
                extractedData = null;
                generatedBlob = null;
            }

            // --- 处理文件选择 ---
            async function handleFileSelect(file) {
                resetState(); // 先重置
                currentFile = file;
                fileNameDisplay.textContent = file.name;
                fileInfoBar.style.display = 'flex';

                try {
                    // 加载 PDF
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    currentPDF = pdf;
                    totalPages = pdf.numPages;
                    pageCountDisplay.textContent = `${totalPages} 页`;

                    // 启用转换按钮
                    convertBtn.disabled = false;
                } catch (error) {
                    console.error('PDF加载失败:', error);
                    alert('PDF文件损坏或无法解析，请检查文件。');
                    resetState();
                }
            }

            // --- 提取所有页面文本和图片 ---
            async function extractAllContent(pdf) {
                const pagesData = [];
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    // 提取文本
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');

                    // 提取图片 (通过获取操作列表)
                    const ops = await page.getOperatorList();
                    const imgData = [];
                    let imgIndex = 0;

                    for (let i = 0; i < ops.fnArray.length; i++) {
                        if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
                            const imgName = ops.argsArray[i][0];
                            try {
                                const img = await page.objs.get(imgName);
                                if (img) {
                                    // 将图片转换为base64
                                    const canvas = document.createElement('canvas');
                                    canvas.width = img.width;
                                    canvas.height = img.height;
                                    const ctx = canvas.getContext('2d');
                                    ctx.putImageData(img, 0, 0);
                                    const base64 = canvas.toDataURL('image/png');
                                    imgData.push({
                                        index: imgIndex++,
                                        base64: base64,
                                        width: img.width,
                                        height: img.height
                                    });
                                }
                            } catch (e) {
                                console.warn(`提取图片失败: ${imgName}`, e);
                            }
                        }
                    }

                    pagesData.push({
                        pageNum,
                        text: pageText,
                        images: imgData
                    });
                }
                return pagesData;
            }

            // --- 开始转换 (根据targetFormat) ---
            async function startConversion() {
                if (!currentPDF) {
                    alert('请先选择PDF文件');
                    return;
                }

                // 禁用按钮，显示加载
                convertBtn.disabled = true;
                const originalBtnHtml = convertBtn.innerHTML;
                convertBtn.innerHTML = '<span class="loading-spinner"></span> 提取内容中...';

                try {
                    // 提取所有内容
                    const pages = await extractAllContent(currentPDF);
                    extractedData = pages;

                    if (targetFormat === 'xlsx') {
                        generateExcel(pages);
                    } else {
                        generateWordWithImages(pages);
                    }
                } catch (error) {
                    console.error('转换失败:', error);
                    alert('转换过程中发生错误: ' + error.message);
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = originalBtnHtml;
                }
            }

            // --- 生成 Excel (只保留文本) ---
            function generateExcel(pagesData) {
                const wb = XLSX.utils.book_new();
                pagesData.forEach((page, idx) => {
                    // 简单处理：第一行列标题，第二行放文本
                    const sheetData = [
                        [`第 ${page.pageNum} 页 内容`],
                        [page.text],
                        ['--- 页面包含图片数量: ' + page.images.length + ' ---']
                    ];
                    // 如果有图片，记录图片信息
                    page.images.forEach((img, i) => {
                        sheetData.push([`图片 ${i+1}: ${img.width}x${img.height} (base64长度: ${img.base64.length})`]);
                    });
                    const ws = XLSX.utils.aoa_to_sheet(sheetData);
                    XLSX.utils.book_append_sheet(wb, ws, `页${page.pageNum}`);
                });

                // 生成Excel文件
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([wbout], { type: 'application/octet-stream' });
                generatedBlob = blob;

                // 显示下载卡片
                const fileName = `PDF转Excel_${new Date().getTime()}.xlsx`;
                resultFileName.textContent = fileName;
                resultCard.style.display = 'flex';
                downloadBtn.onclick = () => saveAs(generatedBlob, fileName);

                // 恢复按钮
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<i class="fas fa-sync-alt"></i><span>开始转换</span>';
            }

            // --- 生成 Word (嵌入图片) 使用 HTML 模板 + base64 图片 ---
            function generateWordWithImages(pagesData) {
                // 构建HTML内容，包含图片
                let htmlContent = `
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <title>PDF转Word含图片</title>
                        <style>
                            body { font-family: '微软雅黑', sans-serif; margin: 2cm; }
                            h1 { color: #1e4b6e; border-bottom: 2px solid #1e6b9e; }
                            .page-break { page-break-before: always; }
                            .page-title { background: #f0f7ff; padding: 8px; margin: 20px 0 10px; font-weight: bold; }
                            img { max-width: 100%; height: auto; border: 1px solid #ccc; margin: 10px 0; }
                            .text-content { white-space: pre-wrap; line-height: 1.5; }
                        </style>
                    </head>
                    <body>
                        <h1>PDF转换结果（含嵌入图片）</h1>
                        <p>生成时间: ${new Date().toLocaleString()}</p>
                        <p>总页数: ${pagesData.length}</p>
                `;

                pagesData.forEach((page, index) => {
                    htmlContent += `
                        <div class="page-title">第 ${page.pageNum} 页</div>
                        <div class="text-content">${escapeHtml(page.text)}</div>
                    `;

                    // 嵌入图片
                    if (page.images.length > 0) {
                        htmlContent += `<div style="margin: 15px 0;"><strong>本页图片 (${page.images.length} 张):</strong></div>`;
                        page.images.forEach((img, i) => {
                            htmlContent += `
                                <div style="margin: 10px 0;">
                                    <p>图片 ${i+1} (${img.width} x ${img.height})</p>
                                    <img src="${img.base64}" alt="PDF提取图片" />
                                </div>
                            `;
                        });
                    } else {
                        htmlContent += `<p style="color: #888;">本页无图片</p>`;
                    }

                    // 分页 (除了最后一页)
                    if (index < pagesData.length - 1) {
                        htmlContent += `<div class="page-break"></div>`;
                    }
                });

                htmlContent += `</body></html>`;

                // 转换为Blob并保存为 .doc (Word可打开)
                const blob = new Blob([htmlContent], { type: 'application/msword' });
                generatedBlob = blob;
                const fileName = `PDF转Word_含图片_${new Date().getTime()}.doc`;
                resultFileName.textContent = fileName;
                resultCard.style.display = 'flex';
                downloadBtn.onclick = () => saveAs(generatedBlob, fileName);

                // 恢复按钮
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<i class="fas fa-sync-alt"></i><span>开始转换</span>';
            }

            // HTML转义函数
            function escapeHtml(text) {
                if (!text) return '';
                return String(text)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // 防止默认拖拽行为
            document.addEventListener('dragover', e => e.preventDefault());
            document.addEventListener('drop', e => e.preventDefault());
        })();
    </script>
</body>
</html>
